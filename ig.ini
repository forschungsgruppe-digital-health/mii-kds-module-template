[IG]
; MII KDS module IG build configuration.
;
; [IG] MUST be the very first line of this file: the IG Publisher's
; checkNewIg() rejects an ig.ini unless its content starts with "[IG]"
; (s.startsWith("[IG]")), so any leading comment would make the build fail with
; "unable to find an ig.ini". Keep [IG] on line 1; put all comments below it
; (this mirrors the ig-template-mii-kds self-test ig.ini).
;
; ig       = the SUSHI-generated ImplementationGuide resource; its file name
;            derives from `id` in sushi-config.yaml (replace {{MODULE_SLUG}}
;            there and here).
; template = the IG template. The IG Publisher reads this as a package
;            reference (id#version) UNLESS it starts with `#`, which makes it a
;            LOCAL template folder relative to this IG root. `#ig-template`
;            therefore loads the vendored MII template from ig-template/
;            (ig-template/package/package.json is type fhir.template, plus
;            ig-template/includes/ and ig-template/content/). This is the
;            documented bring-up fallback (spec §4.1): the published package
;            de.medizininformatikinitiative.template has no registry entry /
;            release yet. Once ig-template-mii-kds releases, switch this line to
;            `template = de.medizininformatikinitiative.template#<version>` and
;            delete ig-template/ — see docs/recipes/switch-template-to-published.md
;            and ig-template/README.md.
ig = fsh-generated/resources/ImplementationGuide-mii-ig-{{MODULE_SLUG}}.json
template = #ig-template

; ═══════════════════════════════════════════════════════════════════════════
;  ig.ini reference — every option the IG Publisher reads from this file
;  (copied so you can see the full surface without external research). ig.ini
;  is intentionally tiny: it has only TWO keys, `ig` and `template`. Everything
;  else about the IG is configured in the ImplementationGuide resource, which
;  SUSHI generates from sushi-config.yaml (see the `parameters:` block there).
;  Full docs: https://build.fhir.org/ig/FHIR/ig-guidance/  and
;  https://confluence.hl7.org/display/FHIR/Implementation+Guide+Parameters
; ───────────────────────────────────────────────────────────────────────────
;
;  ig = <path to the ImplementationGuide resource file>
;    Points at the IG resource the Publisher builds. With SUSHI this is the
;    generated file under fsh-generated/resources/ (as above). Without SUSHI it
;    would be a hand-authored file, e.g.:
;      ig = input/ImplementationGuide-myig.xml
;
;  template = <the IG template to apply>
;    The Publisher applies exactly ONE template. Accepted forms:
;      • Published package (id#version) — the normal, reproducible form:
;          template = de.medizininformatikinitiative.template#0.1.0
;      • Published package, floating to newest (NOT allowed here — §0.2 pins
;        every version for reproducibility; shown only for completeness):
;          template = de.medizininformatikinitiative.template#current
;      • Local template FOLDER — prefix a relative path with `#`:
;          template = #ig-template        (a subfolder of this IG root)
;          template = #.                  (this IG root itself is the template)
;          template = #../my-template     (a sibling folder)
;      • Base HL7 templates (for reference; MII uses fhir2.base.template as the
;        BASE of its own template, not directly here):
;          template = fhir.base.template   (avoided by MII — reported issues)
;          template = hl7.base.template    (HL7 non-FHIR IGs)
;          template = hl7.fhir.template    (adds HL7 logos — not for MII)
;    If no #version is given for a package, the Publisher takes #current.
;
;  Other keys occasionally seen in ig.ini (rarely needed; documented for
;  completeness — leave unset unless you have a specific reason):
;    fhir-settings-file = <path>   ; a fhir-settings.json (e.g. tx server auth)
;    force               = true    ; keep a running publisher, skip some checks
;
;  NB: template-parameters such as copyrightyear, excludexml, releaselabel, etc.
;  are NOT ig.ini keys — set them under `parameters:` in sushi-config.yaml. The
;  full list a template accepts is in the template's config.json
;  ("template-parameters"); fhir2.base.template accepts: copyrightyear,
;  excludelogbinaryformat, excludejson, excludemap, excludettl, excludexml,
;  fmm-definition, globals-in-artifacts, releaselabel, requirements-category-vs,
;  shownav, term-params-in-artifacts, toggle-changes.
; ═══════════════════════════════════════════════════════════════════════════
