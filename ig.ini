; MII KDS module IG build configuration (basis idiom: the ig path points at
; the SUSHI-generated ImplementationGuide resource, whose file name derives
; from `id` in sushi-config.yaml — replace {{MODULE_SLUG}} there and here).
[IG]
ig = fsh-generated/resources/ImplementationGuide-mii-ig-{{MODULE_SLUG}}.json
; The IG Publisher reads a `template =` value as a package reference (id#version)
; unless it starts with `#`, which makes it a LOCAL template folder relative to
; this IG root. `#ig-template` therefore loads the vendored MII template from
; ig-template/ (ig-template/package/package.json is type fhir.template, plus
; ig-template/includes/ and ig-template/content/). This is the documented
; bring-up fallback (spec §4.1): the published package
; de.medizininformatikinitiative.template has no registry entry / release yet.
; Once ig-template-mii-kds releases, switch this line to
; `template = de.medizininformatikinitiative.template#<version>` and delete
; ig-template/ — see docs/recipes/switch-template-to-published.md and
; ig-template/README.md.
template = #ig-template
