# Issue form: feature requests / improvements for THIS template repository.
name: Feature request
description: Suggest an improvement to the template scaffold, CI, docs, or skills.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where the template falls short. Who hits this — a template maintainer or a module author?
      placeholder: When creating a new module, I always have to ... manually.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the template do instead? Sketches, examples, or links to prior art welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they are worse.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for the same idea.
          required: true
