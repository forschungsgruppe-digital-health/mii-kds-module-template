# -----------------------------------------------------------------------------
# TEMPLATE-REPO MAINTENANCE — removed from created modules by the first-run
# bootstrap (docs/recipes/first-run-setup.md). Modules release via the MII
# CalVer Module Release Workflow, never Release Please.
# -----------------------------------------------------------------------------
# release-please — SemVer release automation for THIS TEMPLATE REPO (spec §2.2)
#
# Purpose:   Watches the Conventional Commits that land on `main` (via the
#            dev -> main release-candidate merge, see CONTRIBUTING.md) and
#            maintains a release PR. Merging that release PR cuts the SemVer
#            tag (vMAJOR.MINOR.PATCH), the GitHub Release, and the
#            auto-generated CHANGELOG.md.
# Trigger:   push to `main` (release automation runs on `main` only, §2.6).
# Toggle:    vars.ENABLE_RELEASE_PLEASE — ON by default; set the repo variable
#            to 'false' to make the job skip without editing YAML (§2.13).
# Human-gated steps:
#   - The dev -> main merge (release-candidate gate) is a human-reviewed PR.
#   - The Release Please release PR must be merged by a human; nothing is
#     tagged or released until then.
#
# Scope (§2.2) — the hard boundary: Release Please versions the TEMPLATE REPO
# ITSELF (SemVer, "the tooling"). A module created FROM this template must
# NEVER carry these files — two release systems on one repo corrupt the
# version history. Modules are released solely via the MII Module Release
# Workflow (CalVer YYYY.n.n); the first-run bootstrap deletes
# release-please-config.json, .release-please-manifest.json, this workflow,
# .github/workflows/notify-zulip.yml, and the template CHANGELOG.md from a
# newly created module.
#
# Version sync: release-please-config.json currently needs no `extra-files` —
# the version 0.1.0 appears nowhere else in this repo yet. If a later change
# (e.g. the docs task) embeds the version in another file, add that file to
# `extra-files` so every occurrence is bumped together.
# -----------------------------------------------------------------------------
name: release-please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ vars.ENABLE_RELEASE_PLEASE != 'false' }}
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
